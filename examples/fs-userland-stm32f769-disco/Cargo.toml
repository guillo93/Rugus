[package]
name        = "fs-userland-stm32f769-disco"
description = "Rugus F5.C.3: API de ficheros userland (open/read/write/close) por syscall+IPC bajo MPU sobre rugus-fs en la QSPI NOR de la STM32F769I-DISCO; persiste config y un log circular de faults."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
publish     = false

[[bin]]
name = "fs-userland-stm32f769-disco"
path = "src/main.rs"
test = false
bench = false

[dependencies]
cortex-m            = { workspace = true }
defmt               = { workspace = true }
rugus-core          = { workspace = true, features = ["log"] }
rugus-arch-cortex-m = { workspace = true, features = ["defmt"] }
rugus-kernel        = { workspace = true, features = ["defmt"] }
rugus-runtime       = { workspace = true }
rugus-hal           = { workspace = true }
rugus-hal-stm32f7   = { workspace = true, features = ["stm32f769"] }
rugus-fs            = { workspace = true }
