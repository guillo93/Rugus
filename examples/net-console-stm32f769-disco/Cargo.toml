[package]
name        = "net-console-stm32f769-disco"
description = "Rugus F6.3b: consola rush sobre TCP + descubrimiento IDENTIFY por UDP, con gate de autenticación de canal, en STM32F769I-DISCO."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
publish     = false

[[bin]]
name = "net-console-stm32f769-disco"
path = "src/main.rs"
test = false
bench = false

[dependencies]
cortex-m            = { workspace = true }
defmt               = { workspace = true }
smoltcp             = { workspace = true }
ieee802_3_miim      = { workspace = true }
rand_core           = { workspace = true }
rugus-core          = { workspace = true, features = ["log"] }
rugus-arch-cortex-m = { workspace = true, features = ["defmt"] }
rugus-kernel        = { workspace = true, features = ["defmt"] }
rugus-runtime       = { workspace = true }
rugus-hal           = { workspace = true }
rugus-hal-stm32f7   = { workspace = true, features = ["stm32f769"] }
rugus-net           = { workspace = true }
rugus-crypto        = { workspace = true }
rugus-personality-full = { workspace = true }
rush                = { workspace = true, features = ["auth"] }
