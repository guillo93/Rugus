[package]
name        = "dual-blink-stm32f407g-disco"
description = "Rugus dual-blink: two cooperative tasks on STM32F407G-DISC1."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
publish     = false

[[bin]]
name = "dual-blink-stm32f407g-disco"
path = "src/main.rs"
test = false
bench = false

[dependencies]
cortex-m            = { workspace = true }
defmt               = { workspace = true }
rugus-runtime       = { workspace = true }
rugus-hal           = { workspace = true }
rugus-hal-stm32f4   = { workspace = true, features = ["stm32f407"] }
rugus-core          = { workspace = true, features = ["alloc"] }
rugus-arch-cortex-m = { workspace = true }
