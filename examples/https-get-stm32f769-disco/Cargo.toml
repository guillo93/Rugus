[package]
name        = "https-get-stm32f769-disco"
description = "Rugus G4: HTTPS GET against a LAN server on STM32F769I-DISCO."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
publish     = false

[[bin]]
name = "https-get-stm32f769-disco"
path = "src/main.rs"
test = false
bench = false

[dependencies]
cortex-m            = { workspace = true }
cortex-m-rt         = { workspace = true }
stm32f7             = { workspace = true, features = ["stm32f7x9", "rt"] }
defmt               = { workspace = true }
defmt-rtt           = { workspace = true }
panic-probe         = { workspace = true }
smoltcp             = { workspace = true }
embedded-io         = { workspace = true }
ieee802_3_miim      = { workspace = true }
rugus-runtime       = { workspace = true }
rugus-core          = { workspace = true }
rugus-hal           = { workspace = true }
rugus-hal-stm32f7   = { workspace = true, features = ["stm32f769"] }
rugus-net           = { workspace = true }
rugus-crypto        = { workspace = true }
rugus-tls           = { workspace = true }
