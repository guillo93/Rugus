[package]
name        = "fs-probe-stm32f769-disco"
description = "Rugus F5.C.2: monta el almacén log-structured rugus-fs sobre la QSPI NOR de la STM32F769I-DISCO — set/get, remontaje y contador de arranques persistente."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
publish     = false

[[bin]]
name = "fs-probe-stm32f769-disco"
path = "src/main.rs"
test = false
bench = false

[dependencies]
cortex-m            = { workspace = true }
defmt               = { workspace = true }
rugus-runtime       = { workspace = true }
rugus-hal           = { workspace = true }
rugus-hal-stm32f7   = { workspace = true, features = ["stm32f769"] }
rugus-fs            = { workspace = true }
