[workspace]
# Crate independiente del workspace embebido (target AArch64).

[package]
name = "rpi3-el0-rust"
description = "Rugus G6.3b: una tarea userland EL0 escrita en RUST (sección de enlazado .user mapeada EL0), planificada por el Scheduler<CortexA> y cooperando con una tarea EL1 por syscalls."
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "rpi3-el0-rust"
path = "src/main.rs"
test = false
bench = false

[dependencies]
rugus-core = { path = "../../crates/rugus-core" }
rugus-arch-cortex-a = { path = "../../crates/rugus-arch-cortex-a" }

[profile.release]
opt-level = 2
lto = true
debug = true
panic = "abort"

[profile.dev]
panic = "abort"
