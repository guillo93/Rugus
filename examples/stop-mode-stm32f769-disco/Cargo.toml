[package]
name        = "stop-mode-stm32f769-disco"
description = "Rugus F5.A.2: modo STOP con wake por RTC (LSI) en STM32F769I-DISCO — en plazos largos el idle apaga HSE/PLL y entra en STOP, despertando con el wakeup timer del RTC y restaurando 216 MHz al volver."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
publish     = false

[[bin]]
name = "stop-mode-stm32f769-disco"
path = "src/main.rs"
test = false
bench = false

[dependencies]
cortex-m            = { workspace = true }
defmt               = { workspace = true }
rugus-runtime       = { workspace = true }
rugus-core          = { workspace = true, features = ["log"] }
# Modo STOP (F5.A.2): la feature `stop` del backend arch activa, en el camino de
# idle, el salto al manejador de STOP cuando el próximo plazo supera el umbral.
# `stop` implica `tickless`, así que en plazos cortos se usa el tick dinámico.
rugus-arch-cortex-m = { workspace = true, features = ["stop", "defmt"] }
rugus-kernel        = { workspace = true, features = ["defmt"] }
rugus-hal           = { workspace = true }
rugus-hal-stm32f7   = { workspace = true, features = ["stm32f769"] }
