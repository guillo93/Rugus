[package]
name        = "qspi-probe-stm32f769-disco"
description = "Rugus F5.C.1: bringup de la flash QSPI NOR (MT25QL512) en STM32F769I-DISCO — JEDEC ID + erase/program/read como BlockDevice."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
publish     = false

[[bin]]
name = "qspi-probe-stm32f769-disco"
path = "src/main.rs"
test = false
bench = false

[dependencies]
cortex-m            = { workspace = true }
defmt               = { workspace = true }
rugus-runtime       = { workspace = true }
rugus-hal           = { workspace = true }
rugus-hal-stm32f7   = { workspace = true, features = ["stm32f769"] }
