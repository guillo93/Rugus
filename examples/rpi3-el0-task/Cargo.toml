[workspace]
# Crate independiente del workspace embebido (target AArch64).

[package]
name = "rpi3-el0-task"
description = "Rugus G6.2b: una tarea userland EL0 planificada por el Scheduler<CortexA> de rugus-core, aislada por MMU, cooperando con una tarea EL1 vía syscalls (SVC)."
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "rpi3-el0-task"
path = "src/main.rs"
test = false
bench = false

[dependencies]
rugus-core = { path = "../../crates/rugus-core" }
rugus-arch-cortex-a = { path = "../../crates/rugus-arch-cortex-a" }

[profile.release]
opt-level = 2
lto = true
debug = true
panic = "abort"

[profile.dev]
panic = "abort"
