[package]
name        = "tickless-stm32f769-disco"
description = "Rugus F5.A.1: tick dinámico (tickless) en STM32F769I-DISCO — el scheduler reprograma SysTick al próximo plazo en idle, reduciendo despertares ociosos sin perder precisión del reloj."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
publish     = false

[[bin]]
name = "tickless-stm32f769-disco"
path = "src/main.rs"
test = false
bench = false

[dependencies]
cortex-m            = { workspace = true }
defmt               = { workspace = true }
rugus-runtime       = { workspace = true }
rugus-core          = { workspace = true, features = ["log"] }
# Tick dinámico (F5.A.1): activa la feature `tickless` del backend arch. La
# unificación de features de Cargo hace que el `CortexM::idle` que usa el kernel
# en este binario sea el que reprograma SysTick al próximo plazo.
rugus-arch-cortex-m = { workspace = true, features = ["tickless", "defmt"] }
rugus-kernel        = { workspace = true, features = ["defmt"] }
rugus-hal           = { workspace = true }
rugus-hal-stm32f7   = { workspace = true, features = ["stm32f769"] }
