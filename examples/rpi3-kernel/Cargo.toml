[workspace]
# Crate independiente del workspace embebido (target AArch64).

[package]
name = "rpi3-kernel"
description = "Rugus G5: el scheduler arch-agnóstico de rugus-core corriendo en RPi 3B+ vía rugus-arch-cortex-a (AArch64)."
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "rpi3-kernel"
path = "src/main.rs"
test = false
bench = false

[dependencies]
rugus-core = { path = "../../crates/rugus-core" }
rugus-arch-cortex-a = { path = "../../crates/rugus-arch-cortex-a" }

[profile.release]
opt-level = 2
lto = true
debug = true
panic = "abort"

[profile.dev]
panic = "abort"
