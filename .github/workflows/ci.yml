name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Una entrada por target soportado. Crecer con el roadmap.
        target: [thumbv7em-none-eabihf, thumbv7m-none-eabi]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings

  build:
    name: build (${{ matrix.profile }} / ${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [dev, release]
        target: [thumbv7em-none-eabihf, thumbv7m-none-eabi]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo build --workspace --release --target ${{ matrix.target }}
          else
            cargo build --workspace --target ${{ matrix.target }}
          fi

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --target thumbv7em-none-eabihf

  host:
    name: host crates (rugus-proto + rugus-cli + rugus-host-tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/rugus-proto
            crates/rugus-cli
            crates/rugus-host-tests
      - name: Install BLE/serial system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libdbus-1-dev pkg-config
      - name: rustfmt (host crates)
        run: |
          cargo fmt --manifest-path crates/rugus-proto/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/rugus-cli/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/rugus-host-tests/Cargo.toml --all -- --check
      - name: clippy + test rugus-proto
        run: |
          cargo clippy --manifest-path crates/rugus-proto/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path crates/rugus-proto/Cargo.toml
      - name: clippy + build rugus-cli (serial + BLE + TUI)
        run: |
          cargo clippy --manifest-path crates/rugus-cli/Cargo.toml --all-targets -- -D warnings
          cargo build --manifest-path crates/rugus-cli/Cargo.toml
      - name: clippy + test rugus-host-tests (scheduler + MPU sandbox + ABI)
        run: |
          cargo clippy --manifest-path crates/rugus-host-tests/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path crates/rugus-host-tests/Cargo.toml
      - name: test rugus-fs (log-structured KV + power-loss, RAM-NOR mock)
        run: |
          cargo test -p rugus-fs --target x86_64-unknown-linux-gnu
          cargo clippy -p rugus-fs --target x86_64-unknown-linux-gnu --all-targets -- -D warnings
