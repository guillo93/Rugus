name: 🐛 Bug report
description: Algo no funciona como debería en Rugus.
title: "bug: "
labels: ["kind:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar. Cuanto más concreto sea el reporte, antes se arregla.
        Si no tienes claro si es bug o pregunta, abre una [Discussion](https://github.com/guillo93/Rugus/discussions) en su lugar.

  - type: input
    id: version
    attributes:
      label: Versión de Rugus
      description: Tag (`v0.1.0`), commit SHA, o `main` con fecha.
      placeholder: "v0.1.0 / main @ 2026-05-25"
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Arquitectura afectada
      multiple: true
      options:
        - cortex-m (genérico)
        - cortex-m / stm32f7
        - cortex-m / otro (especifica abajo)
        - cortex-a (futuro)
        - riscv (futuro)
        - avr (futuro)
        - no aplica / generic
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: Qué pasó
      description: Comportamiento observado, en concreto.
      placeholder: "Al llamar a LedPin::new(), el panic handler dispara con 'GPIO not initialized'."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Qué esperabas que pasara
      placeholder: "El pin debe configurarse como salida push-pull sin error."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Pasos para reproducir
      description: Código mínimo + comandos. Idealmente un ejemplo standalone que falle.
      placeholder: |
        1. Clone `git@github.com:guillo93/Rugus.git`.
        2. `cd examples/blink-stm32f769-disco`.
        3. `cargo run`.
        4. Observar panic en consola RTT.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / salida (defmt RTT, panic message, etc.)
      render: shell

  - type: input
    id: toolchain
    attributes:
      label: Toolchain
      placeholder: "rustc 1.95.0 (59807616e 2026-04-14), probe-rs 0.24.0, Windows 11"

  - type: checkboxes
    id: terms
    attributes:
      label: Antes de enviar
      options:
        - label: He buscado issues existentes y no encontré uno similar.
          required: true
        - label: Acepto el [Code of Conduct](https://github.com/guillo93/Rugus/blob/main/CODE_OF_CONDUCT.md).
          required: true
